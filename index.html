<!DOCTYPE html>
<html>
<head>
  <title>Magic Mickey Adventure</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-box">
    <h1>✨ Magic Mickey Adventure ✨</h1>

    <p class="story">Hey Mickey, can you come out? Your friend is here!</p>

    <div id="door">🚪</div>

    <button onclick="callMickey()">Call Mickey</button>
    <button onclick="giveCheese()">Give Cheese 🧀</button>
    <button onclick="goAdventure()">Go Adventure 🌟</button>

    <h2 id="message">Click “Call Mickey” to begin!</h2>
    <p id="points">Friendship Points: 0</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
